<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sitemap Inspector — IA visualisation toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="topbar">
    <div class="brand">Sitemap <b>Inspector</b></div>
    <div id="stats"></div>
    <div class="spacer"></div>
    <input id="searchbox" type="text" placeholder="search pages…">
    <button id="flagToggle" title="Highlight test/clone/error/duplicate pages">flag check</button>
    <button id="sampleBtn" title="Reload the bundled sample sitemap">sample data</button>
    <button id="uploadBtn" title="Upload a Slickplan CSV export">upload CSV</button>
    <input id="fileInput" type="file" accept=".csv">
  </div>

  <div id="tabs"></div>

  <div id="main"></div>

  <div id="readout"><span class="path">Loading sitemap…</span></div>

  <!-- libraries load via js/lib-loader.js, with an automatic fallback
       mirror if jsdelivr fails for any single resource; app scripts
       (core.js, the views, main.js) load afterwards, in order -->
  <script src="js/lib-loader.js"></script>
</body>
</html>
